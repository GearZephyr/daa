using namespace std;

#define INF 999

int main() {
    int n;
    int D[50][50], P[50][50];

    cout << "Enter number of vertices: ";
    cin >> n;

    cout << "Enter distance matrix:" << endl;
    for(int i = 0; i < n; i++) {
        for(int j = 0; j < n; j++) {
            cin >> D[i][j];
        }
    }

    for(int i = 0; i < n; i++) {
        for(int j = 0; j < n; j++) {
            if(i == j || D[i][j] == INF)
                P[i][j] = -1;
            else
                P[i][j] = i;
        }
    }

    cout << "\\nInitial Distance Matrix:\\n";
    for(int i = 0; i < n; i++) {
        for(int j = 0; j < n; j++) {
            cout << D[i][j] << " ";
        }
        cout << endl;
    }

    cout << "\\nInitial Path Matrix:\\n";
    for(int i = 0; i < n; i++) {
        for(int j = 0; j < n; j++) {
            cout << P[i][j] << " ";
        }
        cout << endl;
    }

    for(int k = 0; k < n; k++) {
        for(int i = 0; i < n; i++) {
            for(int j = 0; j < n; j++) {
                if(D[i][k] != INF && D[k][j] != INF && D[i][j] > D[i][k] + D[k][j]) {
                    D[i][j] = D[i][k] + D[k][j];
                    P[i][j] = k;

            }

        cout << "\\nDistance Matrix after k = " << k + 1 << ":\\n";

            for(int j = 0; j < n; j++) {
                cout << D[i][j] << " ";

                cout << P[i][j] << " ";
            }
            cout << endl;

            cout << D[i][j] << " ";
        }
        cout << endl;
    }

    return 0;
}`,

void printOptimalParenthesis(int i, int j) {
    if(i == j) {
        cout << "A" << i;
    } else {
        cout << "(";
        printOptimalParenthesis(i, s[i][j]);
        printOptimalParenthesis(s[i][j] + 1, j);

void matrixChainMultiplication(int p[], int n) {
    for(int i = 1; i <= n; i++) {
        m[i][i] = 0;
    }

    for(int l = 2; l <= n; l++) {
        for(int i = 1; i <= n - l + 1; i++) {
            int j = i + l - 1;
            m[i][j] = 999999;

            for(int k = i; k < j; k++) {
                int q = m[i][k] + m[k + 1][j] + p[i - 1] * p[k] * p[j];
                if(q < m[i][j]) {
                    m[i][j] = q;
                    s[i][j] = k;
                }
            }
        }

        cout << "\\nM Matrix:\\n";
        for(int x = 1; x <= n; x++) {
            for(int y = 1; y <= n; y++) {
                cout << m[x][y] << "\\t";
            }
            cout << endl;
        }

        cout << "\\nS Matrix:\\n";
        for(int x = 1; x <= n; x++) {
            for(int y = 1; y <= n; y++) {
                cout << s[x][y] << "\\t";
            }
            cout << endl;
        }
    }

    cout << "\\nOptimal Parenthesization: ";
    printOptimalParenthesis(1, n);

#include <string>
using namespace std;

char b[30][30];
int c[30][30];

void printLCS(string x, int i, int j) {
    if(i == 0 || j == 0)
        return;

    if(b[i][j] == 'D') {
        printLCS(x, i - 1, j - 1);
        cout << x[i - 1];
    }
    else if(b[i][j] == 'U') {
        printLCS(x, i - 1, j);
    }
    else {
        printLCS(x, i, j - 1);
    }
}

void lcsLength(string x, string y, int m, int n) {
    for(int i = 0; i <= m; i++)
        c[i][0] = 0;

    for(int j = 0; j <= n; j++)
        c[0][j] = 0;

    for(int i = 1; i <= m; i++) {
        for(int j = 1; j <= n; j++) {
            if(x[i - 1] == y[j - 1]) {
                c[i][j] = c[i - 1][j - 1] + 1;
                b[i][j] = 'D';
            }
            else if(c[i - 1][j] >= c[i][j - 1]) {
                c[i][j] = c[i - 1][j];
                b[i][j] = 'U';
            }
            else {
                c[i][j] = c[i][j - 1];
                b[i][j] = 'L';
            }
        }
    }

    cout << "\\nB Table:\\n";
    for(int x1 = 1; x1 <= m; x1++) {
        for(int y1 = 1; y1 <= n; y1++) {
            cout << b[x1][y1] << "\\t";
        }
        cout << endl;
    }

    cout << "\\nC Table:\\n";
    for(int x1 = 0; x1 <= m; x1++) {
        for(int y1 = 0; y1 <= n; y1++) {
            cout << c[x1][y1] << "\\t";
        }
        cout << endl;
    }

    cout << "\\nLength of LCS: " << c[m][n] << endl;

    if(c[m][n] == 0) {
        cout << "No common subsequence present" << endl;
    } else {
        cout << "Longest Common Subsequence: ";
        printLCS(x, m, n);
        cout << endl;
    }

    cout << "Enter first string: ";
    cin >> x;

    cout << "Enter second string: ";
    cin >> y;

    int m = x.length();
    int n = y.length();

}`,

#include <string>
using namespace std;

void computePrefixFunction(string p, int pi[]) {
    int m = p.length();
    pi[1] = 0;
    int k = 0;

    for(int q = 2; q <= m; q++) {
        while(k > 0 && p[k] != p[q - 1])
            k = pi[k];

        if(p[k] == p[q - 1])
            k = k + 1;

        pi[q] = k;
    }

    cout << "PI Table: ";
    for(int i = 1; i <= m; i++) {
        cout << pi[i] << " ";
    }
    cout << endl;
}

void kmpMatcher(string T, string P) {
    int n = T.length();
    int m = P.length();
    int pi[100];
    int flag = 0;

    computePrefixFunction(P, pi);

    int q = 0;
    for(int i = 1; i <= n; i++) {
        while(q > 0 && P[q] != T[i - 1])
            q = pi[q];

        if(P[q] == T[i - 1])

        if(q == m) {
            cout << "Pattern occurs at shift: " << i - m << endl;
            q = pi[q];
            flag++;
        }
    }

    if(flag == 0)
        cout << "Pattern not found" << endl;
}

};

function copyCode(type) {
    const text = codes[type];

    if (navigator.clipboard && window.isSecureContext) {
        navigator.clipboard.writeText(text)
        .then(() => {
            document.getElementById("status").innerText = type.toUpperCase() + " copied!";
        })
        .catch(() => fallbackCopy(text, type));
    } else {
        fallbackCopy(text, type);
    }
}

function fallbackCopy(text, type) {
    const textarea = document.createElement("textarea");
    textarea.value = text;
    document.body.appendChild(textarea);
    textarea.select();
    document.execCommand("copy");
    document.body.removeChild(textarea);

    document.getElementById("status").innerText = type.toUpperCase() + " copied!";
}
